<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sketchbook</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book">

    <!-- background paper -->
    <div class="page">

        <!-- sketches -->
        <img src="assets/placeholder1.png" class="sketch s1">
        <img src="assets/placeholder2.png" class="sketch s2">
        <img src="assets/placeholder3.png" class="sketch s3">

        <!-- tape -->
        <img src="assets/tape.png" class="tape t1">
        <img src="assets/tape.png" class="tape t2">

        <!-- stains -->
        <img src="assets/stain.png" class="stain st1">
        <img src="assets/stain.png" class="stain st2">

        <!-- visual navigation -->
        <div class="circle"></div>
        <div class="square"></div>
        <div class="line"></div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
